<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cabinet.css">
    <title>GBH</title>
</head>
<body> 
    <header>
        <div class="header">
            <div class="logo"><img src="../source/logo.png" alt="Logo" id="home"><div class="namelogo">GBH</div></div>
            <div class="razdelrazdel">Расчет БЖУ</div>
            <button class="burgermenu" type="button" id="burgers" onclick="toggleMenu()"><img src="../source/menu.png" alt="Menu"></button>
        </div>
    </header>
    <div class="page">
        <div class="conteiner">
            <div class="logincard">
                <h1 class="hhru">Личный кабинет</h1>
                <hr>
                
                <div class="profileinfo">
                    <h2 id="Nickname">Никнейм</h2>
                    <p id="Fio">Фамилия Имя</p>
                </div>

                <div class="loginform">
                    <div class="rowka">
                        <div class="inputitem">
                            <div class="poletitle">Возраст</div>
                            <div class="polevalue" id="Age">25</div>
                        </div>
                        <div class="inputitem">
                            <div class="poletitle">Цели тренировок</div>
                            <div class="polevalue" id="Goal">Набор массы</div>
                        </div>
                    </div>

                    <div class="rowka">
                        <div class="inputitem">
                            <div class="poletitle">Email</div>
                            <div class="polevalue" id="Email">pochta@mail.ru</div>
                        </div>
                        <div class="inputitem">
                            <div class="poletitle">Уровень физической подготовки</div>
                            <div class="polevalue" id="Level">Средний</div>
                        </div>
                    </div>

                    <div class="rowka">
                        <div class="inputitem">
                            <div class="poletitle">Пол</div>
                            <div class="polevalue" id="Gender">Мужской</div>
                        </div>
                        <div class="inputitem">
                            <div class="poletitle">Рост</div>
                            <div class="polevalue" id="Height">167 см</div>
                        </div>
                    </div>

                    <div class="rowka odinochka">
                        <div class="inputitem">
                            <div class="poletitle">Вес</div>
                            <div class="polevalue" id="Weight">67 кг</div>
                        </div>
                    </div>

                    <div class="signa">
                        <button type="button" onclick="document.location.href='../cabinetchange/cabinetchange.html'">Изменить</button>
                    </div>
                </div>
            </div>
        </div>
        <aside class="sidemenu" id="sideMenu">
            <div class="otdel">
                <div class="sidemenulogo">
                    <img src="../source/logo-alt.png">
                </div>
                <div class="closee">
                    <button type="button" class="sidemenuclose" id="menuClose" onclick="closeMenu()">×</button>
                </div>
            </div>
            <nav class="sidemenunav">
                <a href="../main/main.html">Главная</a>
                <a href="../cabinet/cabinet.html">Личный кабинет</a>
                <a href="../calc/calc.html">Расчет БЖУ</a>
                <a href="../diary/diary.html">Дневник</a>
                <a href="../base/base.html">База упражнений</a>
            </nav>
        </aside>
    </div>
    <footer>
        <img src="../source/logo-alt.png" alt="logo">
    </footer>
    <script src="../scripts/menu.js"></script>
	<script src="../scripts/cabinet.js"></script>
</body>
</html>
