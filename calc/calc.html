<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <title>GBH</title>
</head>
<body> 
    <header>
        <div class="header">
            <div class="logo"><img src="../source/logo.png" alt="Logo" id="home"><div class="namelogo">GBH</div></div>
            <div class="razdelrazdel">Расчет БЖУ</div>
            <button class="burgermenu" type="button" id="burgers" onclick="toggleMenu()"><img src="../source/menu.png" alt="Menu"></button>
        </div>
    </header>
    <div class="page">
        <div class="conteiner">
            <div class="calc">
                <div><h1 class="hhru">Калькулятор</h1></div>
                <div class="inputgroup inp1">
                        <div class="inputitem">
                            <label for="height">Рост, см</label>
                            <input type="number" id="height" placeholder="Введите ваш рост" class="ghhh">
                        </div>
                        <div class="inputitem">
                            <label for="weight">Вес, кг</label>
                            <input type="number" id="weight" placeholder="Введите ваш вес">
                        </div>
                        <div class="inputitem">
                            <label for="age">Возраст, лет</label>   
                            <input type="number" id="age" placeholder="Введите ваш возраст">
                        </div>

                </div>

                <div class="inputgroup inp2">
                    <div class="inputitem">
                        
                            <label for="Aim">Цель</label>
                        
                            <select id="Aim">
                                <option value="0">Поддержание веса</option>
                                <option value="1">Похудение</option>
                                <option value="2">Набор мышечной массы</option>
                            </select>

                    </div>
                    <div class="chungok">
                        
                            <label for="numTrainings">Планируемое кол-во тренировок в неделю</label>
                        
                        <div>
                            <select id="numTrainings" class="fffg">
                                <option value="0">0 раз в неделю</option>
                                <option value="1">1 раз в неделю</option>
                                <option value="2">2 раза в неделю</option>
                                <option value="3">3 раза в неделю</option>
                                <option value="4">4 раза в неделю</option>
                                <option value="5">5 раз в неделю</option>
                                <option value="6">6 раз в неделю</option>
                                <option value="7">7 раз в неделю</option>
                            </select>
                        </div>
                    </div>
                    <div class="inputitem">
                        
                            <label for="psylevel">Уровень физической подготовки</label>
                        
                        <select id="psylevel">
                            <option value="0">Новичок</option>
                            <option value="1">Средний</option>
                            <option value="2">Профи</option>
                        </select>
                    </div>
                    <div class="inputitem">
                        <label for="activity">Уровень активности:</label>
                            <select id="activity">
                                <option value="0">Малоподвижный образ жизни</option>
                                <option value="1">Легкая активность (легкие упражнения 1-3 дня в неделю)</option>
                                <option value="2">Средняя активность (умеренные упражнения 3-5 дней в неделю)</option>
                                <option value="3">Высокая активность (интенсивные упражнения 6-7 дней в неделю)</option>
                                <option value="4">Очень высокая активность (очень интенсивные упражнения, физическая работа или тренировки два раза в день)</option>
                            </select>
                    </div>
                    <div class="radik">
                        <input type="radio" id="male" name="gender" value="male">Мужской</input>
                        <input type="radio" id="female" name="gender" value="female">Женский</input>
                    </div>
                    </div>
                    <div class="btnitog">
                        <button class="calculatebtn" onclick="calculate()"><span class="textitog">Рассчитать калораж</button>
                    </div>
                </div>
            </div>
        </div>
        <aside class="sidemenu" id="sideMenu">
            <div class="otdel">
                <div class="sidemenulogo">
                    <img src="../source/logo-alt.png">
                </div>
                <div class="closee">
                    <button type="button" class="sidemenuclose" id="menuClose" onclick="closeMenu()">×</button>
                </div>
            </div>
            <nav class="sidemenunav">
                <a href="../main/main.html">Главная</a>
                <a href="../cabinet/cabinet.html">Личный кабинет</a>
                <a href="../calc/calc.html">Расчет БЖУ</a>
                <a href="../diary/diary.html">Дневник</a>
                <a href="../base/base.html">База упражнений</a>
            </nav>
        </aside>
    </div>
    <footer>
        <img src="../source/logo-alt.png" alt="logo">
    </footer>
    <script src="script.js"></script>
</body>
</html>
