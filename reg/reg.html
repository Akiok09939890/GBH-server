<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reg.css">
    <title>GBH</title>
</head>
<body> 
    <header>
        <div class="header">
            <div class="logo"><img src="../source/logo.png" alt="Logo" id="home"><div class="namelogo">GBH</div></div>
            <div class="razdelrazdel">Расчет БЖУ</div>
            <button class="burgermenu" type="button" id="burgers" onclick="toggleMenu()"><img src="../source/menu.png" alt="Menu"></button>
        </div>
    </header>
    <div class="page">
        <div class="conteiner">
            <div class="logincard">
                <h1 class="hhru">Регистрация</h1>
                <hr>
                <form action="/register" method="POST" class="loginform">
                    <div class="inputgroup">
                        <div class="inputitem">
                            <label for="username">Логин</label>
                            <input type="text" id="username" name="username" class="fg">
                        </div>
                        
                        <div class="inputitem">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" name="password">
                        </div>

                        <div class="inputitem">
                            <label for="passwordconfirm" class="confirmlabel">Подтвердите пароль</label>
                            <input type="password" id="passwordconfirm" name="passwordconfirm">
                        </div>
                    </div>

                    <div class="rules">
                        <input type="checkbox" id="rules" name="rules" class="check">
                        <label for="rules" class="ruless">Согласие с правилами платформы</label>
                    </div>

                    <p class="ostoroshno">Не используйте в качестве логина и пароля номер телефона или слишком простые слова, символы.</p>

                    <div class="signa">
                        <button type="submit">Создать аккаунт</button>
                    </div>
                </form>
            </div>
        </div>
        <aside class="sidemenu" id="sideMenu">
            <div class="otdel">
                <div class="sidemenulogo">
                    <img src="../source/logo-alt.png">
                </div>
                <div class="closee">
                    <button type="button" class="sidemenuclose" id="menuClose" onclick="closeMenu()">×</button>
                </div>
            </div>
            <nav class="sidemenunav">
                <a href="../main/main.html">Главная</a>
                <a href="../cabinet/cabinet.html">Личный кабинет</a>
                <a href="../calc/calc.html">Расчет БЖУ</a>
                <a href="../diary/diary.html">Дневник</a>
                <a href="../base/base.html">База упражнений</a>
            </nav>
        </aside>
    </div>
    <footer>
        <img src="../source/logo-alt.png" alt="logo">
    </footer>
    <script src="../scripts/menu.js"></script>
</body>
</html>
